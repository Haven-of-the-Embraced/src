name: New Production Deployment

on:
  release:
    types: [published]

jobs:
  deploy-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Ubuntu and Build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NEW_SERVER_HOST }}
          username: ${{ secrets.NEW_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.NEW_SERVER_PORT }}
          script: |
            # Navigate to the production directory
            cd /home/havenlive/src
            
            # Fetch latest data and tags, pruning deleted branches
            git fetch -p --tags
            
            # Checkout the specific tag of the release in a detached HEAD state
            git checkout ${{ github.event.release.tag_name }}
            
            # Compile the codebase
            make new
